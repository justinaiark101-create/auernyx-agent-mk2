name: mk2-alteration-gate

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # FLAW FIX: Fetch full history so git diff can see the base branch
          fetch-depth: 0

      - name: Fetch Base Branch
        # Ensures the 'main' branch is physically present in the runner's git graph
        run: git fetch origin main:main

      - name: Run Alteration Gate (Fail-Closed)
        env:
          # Dynamically calculate the merge-base to avoid "Blind Diff" errors
          MK2_BASE_REF: ${{ github.event.pull_request.base.sha || 'main' }}
        run: python3 tools/ci_gate.py
