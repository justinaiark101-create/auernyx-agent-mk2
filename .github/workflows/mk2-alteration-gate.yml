name: mk2-alteration-gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch base
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          echo "Base ref: ${{ github.base_ref }}, SHA: ${BASE_SHA}"
          git fetch origin ${{ github.base_ref }}
          git rev-parse "${BASE_SHA}"
          git merge-base "${BASE_SHA}" HEAD
          echo "MK2_BASE_REF=${BASE_SHA}" >> $GITHUB_ENV

      - name: Run alteration gate (fail-closed)
        run: python3 tools/ci_gate.py
