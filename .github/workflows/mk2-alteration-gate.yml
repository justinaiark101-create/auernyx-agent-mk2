name: mk2-alteration-gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base
        run: |
          # Always use the freshly-fetched base-branch tip so that auth records
          # added to main after the PR was opened are not included in the PR diff.
          git fetch origin ${{ github.base_ref }}
          BASE_SHA=$(git rev-parse FETCH_HEAD)
          echo "Base ref: ${{ github.base_ref }}, SHA: ${BASE_SHA}"
          echo "Merge base: $(git merge-base "${BASE_SHA}" HEAD)"
          echo "MK2_BASE_REF=${BASE_SHA}" >> $GITHUB_ENV

      - name: Run alteration gate (fail-closed)
        run: python3 tools/ci_gate.py
